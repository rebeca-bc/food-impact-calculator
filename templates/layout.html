<!-- templates/index.html -->
<!doctype html>
<html>
<head>
  <title>{% block title %} Food Impact Calculator {% endblock %}</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="../static/styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="background-dark">
    <!-- Modern Navigation Bar -->
    <nav class="modern-nav">
        <div class="nav-container">
            <div class="nav-brand">
                <i class="bi bi-globe2"></i>
                <span>EcoCalc</span>
            </div>
            <div class="nav-links">
                <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">
                    <i class="bi bi-calculator"></i> Calculator
                </a>
                <a href="/ml-predict" class="nav-link {% if request.path == '/ml-predict' %}active{% endif %}">
                    <i class="bi bi-lightbulb"></i> ML Predictor
                </a>
            </div>
        </div>
    </nav>
    
    {% block content %}
    
    {% endblock %}
    
    <!-- Footer -->
    <footer class="app-footer">
        <p>Powered by Machine Learning • Data from Kaggle • Made with <i class="bi bi-heart-fill"></i></p>
    </footer>
    
    <script src="../static/main.js"></script>
</body>
